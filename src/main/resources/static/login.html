<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Todo Manager</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-hero">
        <div class="logo-mark"><img src="img/logo.jpeg" alt="Todo Manager logo"></div>
        <h1>Welcome Back!</h1>
        <p>Sign in to continue managing your daily tasks, track your productivity, and achieve your goals.</p>
    </div>
    <div class="auth-panel">
        <div class="auth-card">
            <h2>Login</h2>
            <div class="form-error" id="errorBox"></div>

            <form id="loginForm">
                <div class="field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <div class="password-field">
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-eye" id="toggleEye">👁</button>
                    </div>
                </div>
                <div class="checkbox-row">
                    <label><input type="checkbox" id="remember"> Remember Me</label>
                    <a href="#" id="forgotLink">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">Login</button>
            </form>

            <div class="auth-footer-link">
                Don't have an account? <a href="register.html">Register</a>
            </div>
        </div>
    </div>
</div>

<script src="js/common.js"></script>
<script>
    initThemeFromUser();

    document.getElementById('toggleEye').addEventListener('click', () => {
        const pw = document.getElementById('password');
        pw.type = pw.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('forgotLink').addEventListener('click', (e) => {
        e.preventDefault();
        alert('Please contact support or your instructor to reset your password for this project demo.');
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorBox = document.getElementById('errorBox');
        errorBox.classList.remove('show');
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.textContent = 'Logging in...';

        try {
            const user = await apiRequest('/auth/login', {
                method: 'POST',
                body: JSON.stringify({
                    email: document.getElementById('email').value.trim(),
                    password: document.getElementById('password').value
                })
            });
            setCurrentUser(user);
            window.location.href = 'dashboard.html';
        } catch (err) {
            errorBox.textContent = err.message;
            errorBox.classList.add('show');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Login';
        }
    });
</script>
</body>
</html>
