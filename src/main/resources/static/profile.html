<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Todo Manager</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand"><img src="img/logo.jpeg" alt="Logo" class="brand-logo"> Todo Manager</div>
        <nav>
            <a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a>
            <a href="calendar.html"><span class="icon">📅</span> Calendar</a>
            <a href="profile.html" class="active"><span class="icon">⭐</span> Profile</a>
            <a href="#" id="categoriesLink"><span class="icon">📁</span> Categories</a>
            <a href="profile.html"><span class="icon">⚙️</span> Settings</a>
        </nav>
        <button class="btn-logout" id="logoutBtn">Logout</button>
    </aside>

    <main class="main">
        <div class="main-header"><h1>Profile</h1>
            <button class="icon-btn" id="themeToggleBtn" title="Toggle dark / light theme">🌙</button>
        </div>

        <div class="form-success" id="successBox"></div>
        <div class="form-error" id="errorBox"></div>

        <div class="profile-grid">
            <div class="profile-photo-card">
                <img id="profileImg" src="img/default-profile.png" alt="Profile picture">
                <div>
                    <button class="change-photo-btn" id="changePhotoBtn">Change Photo</button>
                    <input type="file" id="photoInput" accept="image/*" style="display:none">
                </div>
                <div class="theme-toggle-row">
                    <span>🌙 Dark Theme</span>
                    <label class="switch">
                        <input type="checkbox" id="themeSwitch">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div>
                <div class="panel">
                    <h3>Personal Details</h3>
                    <form id="profileForm">
                        <div class="field-row">
                            <div class="field">
                                <label for="fullName">Full Name</label>
                                <input type="text" id="fullName" required>
                            </div>
                            <div class="field">
                                <label for="username">Username</label>
                                <input type="text" id="username" required>
                            </div>
                        </div>
                        <div class="field-row">
                            <div class="field">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" required>
                            </div>
                            <div class="field">
                                <label for="phone">Phone Number</label>
                                <input type="tel" id="phone">
                            </div>
                        </div>
                        <div class="field-row">
                            <div class="field">
                                <label for="dob">Date of Birth</label>
                                <input type="date" id="dob">
                            </div>
                            <div class="field">
                                <label for="country">Country</label>
                                <input type="text" id="country">
                            </div>
                        </div>
                        <div class="field">
                            <label for="gender">Gender</label>
                            <select id="gender">
                                <option value="">Prefer not to say</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-primary" id="saveProfileBtn" style="width:auto; padding:12px 28px;">Save Changes</button>
                    </form>
                </div>

                <div class="panel">
                    <h3>Change Password</h3>
                    <form id="passwordForm">
                        <div class="field-row">
                            <div class="field">
                                <label for="currentPassword">Current Password</label>
                                <input type="password" id="currentPassword" required>
                            </div>
                            <div class="field">
                                <label for="newPassword">New Password</label>
                                <input type="password" id="newPassword" minlength="6" required>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary" id="savePasswordBtn" style="width:auto; padding:12px 28px;">Update Password</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="js/common.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
