<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar — Todo Manager</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand"><img src="img/logo.jpeg" alt="Logo" class="brand-logo"> Todo Manager</div>
        <nav>
            <a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a>
            <a href="calendar.html" class="active"><span class="icon">📅</span> Calendar</a>
            <a href="profile.html"><span class="icon">⭐</span> Profile</a>
            <a href="#" id="categoriesLink"><span class="icon">📁</span> Categories</a>
            <a href="profile.html"><span class="icon">⚙️</span> Settings</a>
        </nav>
        <button class="btn-logout" id="logoutBtn">Logout</button>
    </aside>

    <main class="main">
        <div class="main-header">
            <h1>Calendar</h1>
            <div class="header-actions">
                <button class="icon-btn" id="themeToggleBtn" title="Toggle dark / light theme">🌙</button>
                <button class="btn-add" id="addTaskBtn">+ Add Task</button>
            </div>
        </div>

        <div class="calendar-wrap">
            <div>
                <div class="panel">
                    <div class="calendar-nav">
                        <button id="prevMonth">‹</button>
                        <div class="month-label" id="monthLabel"></div>
                        <button id="nextMonth">›</button>
                    </div>
                    <div class="calendar-grid" id="calendarGrid"></div>
                </div>
            </div>

            <div class="day-detail-panel">
                <h3 id="selectedDateLabel">Select a day</h3>
                <div class="task-list" id="dayTaskList"></div>
            </div>
        </div>
    </main>
</div>

<!-- Add / Edit Task Modal (same as dashboard) -->
<div class="modal-overlay" id="taskModalOverlay">
    <div class="modal">
        <h2 id="modalTitle">Add Task</h2>
        <div class="form-error" id="taskErrorBox"></div>
        <form id="taskForm">
            <input type="hidden" id="taskId">
            <div class="field">
                <label for="taskTitle">Title</label>
                <input type="text" id="taskTitle" placeholder="e.g. Finish project report" required>
            </div>
            <div class="field">
                <label for="taskDescription">Description</label>
                <input type="text" id="taskDescription" placeholder="Optional details">
            </div>
            <div class="field-row">
                <div class="field">
                    <label for="taskCategory">Category</label>
                    <input type="text" id="taskCategory" placeholder="e.g. Work, Study">
                </div>
                <div class="field">
                    <label for="taskPriority">Priority</label>
                    <select id="taskPriority">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
            </div>
            <div class="field-row">
                <div class="field">
                    <label for="taskDueDate">Due Date</label>
                    <input type="date" id="taskDueDate" required>
                </div>
                <div class="field">
                    <label for="taskDueTime">Due Time</label>
                    <input type="time" id="taskDueTime">
                </div>
            </div>
            <div class="field">
                <label for="taskReminder">Remind me before (minutes)</label>
                <input type="number" id="taskReminder" value="15" min="0">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="cancelTaskBtn">Cancel</button>
                <button type="submit" class="btn-primary" id="saveTaskBtn">Save Task</button>
            </div>
        </form>
    </div>
</div>

<script src="js/common.js"></script>
<script src="js/calendar.js"></script>
</body>
</html>
